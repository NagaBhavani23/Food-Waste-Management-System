{% extends 'base.html' %}

{% block title %}Donate Food - FeedForward{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-wrapper">
        <h2>Donate Food</h2>
        <p>Help reduce food waste by sharing your excess food with NGOs</p>
        
        <form method="post" class="form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="food_name">Food Name *</label>
                <input type="text" id="food_name" name="food_name" required placeholder="e.g., Rice, Vegetables, Cooked Meals">
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Describe the food (ingredients, preparation, etc.)"></textarea>
            </div>
            
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="text" id="quantity" name="quantity" required placeholder="e.g., 5 kg, 10 servings, 2 boxes">
            </div>
            
            <div class="form-group">
                <label for="location">Location/Address *</label>
                <input type="text" id="location" name="location" required placeholder="Pickup location">
            </div>
            
            <div class="form-group">
                <label for="contact_number">Contact Phone Number *</label>
                <input type="tel" id="contact_number" name="contact_number" required placeholder="+91 98765 43210">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Publish Donation</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }
    
    .form-actions .btn {
        flex: 1;
    }
</style>

{% endblock %}
