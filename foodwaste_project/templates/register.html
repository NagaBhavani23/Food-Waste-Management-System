{% extends 'base.html' %}

{% block title %}Register - FeedForward{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-wrapper">
        <h2>Create Account</h2>
        
        <form method="post" class="form" id="registerForm">
            {% csrf_token %}
            
            <!-- User Type Selection -->
            <div class="form-group">
                <label>Account Type</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="user_type" value="donor" required checked>
                        <span>Donor (I want to donate food)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="user_type" value="ngo">
                        <span>NGO (I want to request food)</span>
                    </label>
                </div>
            </div>
            
            <!-- Basic Information -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm password">
            </div>
            
            <!-- Donor Specific Fields -->
            <div id="donor-fields" style="display: block;">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1234567890">
                </div>
            </div>
            
            <!-- NGO Specific Fields -->
            <div id="ngo-fields" style="display: none;">
                <div class="form-group">
                    <label for="org_name">Organization Name</label>
                    <input type="text" id="org_name" name="org_name" placeholder="Your NGO name">
                </div>
                
                <div class="form-group">
                    <label for="reg_number">Registration Number</label>
                    <input type="text" id="reg_number" name="reg_number" placeholder="Government registration number">
                </div>
                
                <div class="form-group">
                    <label for="phone_ngo">Phone Number</label>
                    <input type="tel" id="phone_ngo" name="phone" placeholder="+1234567890">
                </div>
                
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Office address">
                </div>
                
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="City name">
                </div>
            </div>
            
            <button type="submit" class="btn btn-large">Register</button>
        </form>
        
        <p class="login-link">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</div>

<script>
    // Toggle form fields based on user type
    const userTypeRadios = document.querySelectorAll('input[name="user_type"]');
    const donorFields = document.getElementById('donor-fields');
    const ngoFields = document.getElementById('ngo-fields');
    
    userTypeRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            if (this.value === 'donor') {
                donorFields.style.display = 'block';
                ngoFields.style.display = 'none';
            } else {
                donorFields.style.display = 'none';
                ngoFields.style.display = 'block';
            }
        });
    });
    
    // Password validation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        
        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match!');
        }
        
        if (password.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters long!');
        }
    });
</script>

{% endblock %}
